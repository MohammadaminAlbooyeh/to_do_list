services:
  backend:
    build:
      context: ./backend
    ports:
      - "5050:5050"
    volumes:
      - todo_data:/app/data
    restart: unless-stopped
    environment:
      - TZ=UTC

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  todo_data:
